name: Release Plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: 'pnpm'

      - name: Extract release notes
        run: pnpm notes "${{ github.ref_name }}"

      - name: Install dependencies
        run: pnpm install

      - name: Detect release mode
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Build plugin
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            pnpm dev
          else
            pnpm build
          fi

      - name: Attest plugin artifacts
        uses: actions/attest@v4.1.0
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          prerelease_flag=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$tag" \
            --title="$tag" \
            --notes-file=release-notes.md \
            $prerelease_flag \
            dist/main.js dist/manifest.json dist/styles.css
